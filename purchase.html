
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Order - HazeHaus Crochet</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .purchase-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
    .purchase-card {
      background: #fff8f2;
      border-radius: 1.2rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(255,180,149,0.15);
      max-width: 420px;
    }
    .purchase-card h2, .purchase-card p { margin-bottom: 1.2rem; }
    .purchase-actions { margin-top: 1.7rem; display: flex; gap: 1.3rem; justify-content: center; }
    .purchase-btn {
      background: #e15555;
      color: #fff;
      padding: 0.9rem 2.2rem;
      border: none;
      border-radius: 2em;
      font-size: 1.12rem;
      font-family: inherit;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.21s;
      box-shadow: 0 2px 12px rgba(230,125,80,0.06);
    }
    .purchase-btn:hover { background: #b13b3b; }
  </style>
</head>
<body>
  <main class="purchase-page">
    <div class="purchase-card">
      <h2>Complete Your HazeHaus Order</h2>
      <p>
        Ready to purchase?<br>
        For now, complete your order directly via Instagram DM or Email us. We'll reply and finalize your order personally!
      </p>
      <div class="purchase-actions">
        <a href="https://www.instagram.com/chaitanya.006/" class="purchase-btn" target="_blank">Message on Instagram</a>
        <a href="mailto:galichatanya958@gmail.com?subject=Order%20From%20HazeHaus%20Website" class="purchase-btn">Email Us</a>
      </div>
      <p style="margin-top:1.2rem;font-size:1.01em;color:#721414;opacity:0.75;">We'll contact you for order confirmation & details.</p>
    </div>
  </main>
</body>
</html>
